    }

    .sub,.help,.muted{color:var(--muted);line-height:1.5}
    .input{
      width:100%;min-height:44px;border-radius:12px;border:1px solid var(--line);
      background:#071222;color:var(--text);padding:10px 12px;font-size:16px;
    }
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .stat{background:#081326;border:1px solid var(--line);border-radius:12px;padding:12px}
    .stat-label{color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase;margin-bottom:6px}
    .stat-value{font-size:18px;font-weight:800;color:var(--text)}
    .progress-wrap{
      margin-top:12px;width:100%;height:12px;border-radius:999px;overflow:hidden;
      background:#071222;border:1px solid var(--line);
    }
    .progress-bar{height:100%;background:linear-gradient(90deg,#6ea2ff,#9bc2ff)}
    .question-card{margin-top:4px}
    .q-type{color:#9db8ff;font-size:13px;font-weight:800;margin-bottom:10px}
    .q-stem{font-size:22px;line-height:1.35;font-weight:800;margin-bottom:16px}
    .prompt-box,.passage{
      background:#081326;border:1px solid var(--line);border-radius:12px;
      padding:12px;margin-bottom:14px;line-height:1.6;
    }
    .choices{display:grid;gap:10px}
    .choice{
      width:100%;text-align:left;border:1px solid var(--line);background:#071222;color:var(--text);
      border-radius:12px;padding:12px 14px;min-height:50px;font-size:16px;font-weight:700;cursor:pointer;
    }
    .choice:hover{border-color:#5f8fff}
    .choice.selected{background:#11254b;border-color:#79a9ff}
    .choice-letter{display:inline-block;min-width:28px;color:#aecdff}
    .footer-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px}
    button{
      min-height:42px;border:none;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:800;
      cursor:pointer;background:#7ea9ff;color:#071426;
    }
    button.secondary{background:#1a2d52;color:var(--text);border:1px solid var(--line)}
    button.warn{background:#f4b740;color:#2a1b00}
    button:disabled{opacity:.45;cursor:not-allowed}
    .review-box{display:grid;gap:12px;margin-top:12px}
    .review-item{border:1px solid var(--line);border-radius:12px;padding:12px;background:#081326}
    .review-top{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:8px}
    .sep{border:none;border-top:1px solid var(--line);margin:16px 0}
    .result-ready{color:var(--good)}
    .result-review{color:var(--warn)}
    @media (max-width:760px){
      .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
      .q-stem{font-size:18px}

function hash32(str){
  let h = 2166136261 >>> 0;
  for(let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function mulberry32(a){
  return function(){
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function shuffleArray(arr, seedStr){
  const a = arr.slice(), rand = mulberry32(hash32(seedStr));
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(rand() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function shuffleIndices(length, seedStr){
  const arr = Array.from({length}, (_, i) => i), rand = mulberry32(hash32(seedStr));
  for(let i=arr.length-1;i>0;i--){ const j = Math.floor(rand() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
  return arr;
}
function cloneQuestion(q){ return JSON.parse(JSON.stringify(q)); }
function remapQuestion(q, seedStr){
  const question = cloneQuestion(q);
  if(question.type === "mc" || question.type === "multiselect" || question.type === "dropdown" || question.type === "passage-mcq"){
    if(Array.isArray(question.choices) && question.choices.length > 1){
      const order = shuffleIndices(question.choices.length, seedStr), inverseMap = {};
      order.forEach((oldIdx, newIdx) => inverseMap[oldIdx] = newIdx);
      question.choices = order.map(i => question.choices[i]);
      question.answer = question.answer.map(oldIdx => inverseMap[oldIdx]).sort((a,b)=>a-b);
    }
  }
  if(question.type === "partab"){
    if(Array.isArray(question.partA?.choices) && question.partA.choices.length > 1){
      const orderA = shuffleIndices(question.partA.choices.length, `${seedStr}|partA`), inverseA = {};
      orderA.forEach((oldIdx, newIdx) => inverseA[oldIdx] = newIdx);
      question.partA.choices = orderA.map(i => question.partA.choices[i]);
      question.partA.answer = question.partA.answer.map(oldIdx => inverseA[oldIdx]).sort((a,b)=>a-b);
    }
    if(Array.isArray(question.partB?.choices) && question.partB.choices.length > 1){
      const orderB = shuffleIndices(question.partB.choices.length, `${seedStr}|partB`), inverseB = {};
      orderB.forEach((oldIdx, newIdx) => inverseB[oldIdx] = newIdx);
      question.partB.choices = orderB.map(i => question.partB.choices[i]);
      question.partB.answer = question.partB.answer.map(oldIdx => inverseB[oldIdx]).sort((a,b)=>a-b);
    }
  }
  return question;
}
function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, s => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[s]));
}
function nowLocalString(d){ return new Date(d).toLocaleString(); }
function formatRuntime(seconds){
  const total = Math.max(0, Math.floor(seconds));
  const h = Math.floor(total / 3600).toString().padStart(2,"0");
  const m = Math.floor((total % 3600) / 60).toString().padStart(2,"0");
  const s = Math.floor(total % 60).toString().padStart(2,"0");
  return `${h}:${m}:${s}`;
}
function letter(i){ return ["A","B","C","D","E","F"][i] || ""; }
function normalizeArray(arr){ return Array.isArray(arr) ? [...arr].sort((a,b)=>a-b) : []; }
function sameArray(a,b){
  const aa = normalizeArray(a), bb = normalizeArray(b);
  return aa.length === bb.length && aa.every((v,i)=>v===bb[i]);
}

let QUESTIONS = [];
let state = { studentName:"", startedAt:null, current:0, answers:[], submitted:false, score:null, attemptNumber:1, questionOrderSeed:null };

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && !parsed.submitted) state = parsed;
    }
  }catch(err){}
}
function isLocked(){ return TEACHER_OVERRIDE ? false : localStorage.getItem(ATTEMPT_KEY) === "USED"; }
function teacherBadge(){ return TEACHER_OVERRIDE ? `<span class="pill">Teacher Override Active</span>` : ``; }
function teacherUnlockNow(){ localStorage.removeItem(ATTEMPT_KEY); localStorage.removeItem(STORAGE_KEY); location.reload(); }
function countAnswered(){ return state.answers.filter(a => a !== null).length; }
function buildQuestions(){
  const seed = state.questionOrderSeed || "default-seed";
  QUESTIONS = QUESTION_BANK.map((q, idx) => remapQuestion(q, `${seed}|${q.id || idx}|choices`));
  QUESTIONS = shuffleArray(QUESTIONS, `${seed}|question-order`);
  if(!Array.isArray(state.answers) || state.answers.length !== QUESTIONS.length){
    state.answers = Array(QUESTIONS.length).fill(null);
  }
}
function isCorrect(q, answer){
  if(q.type === "mc" || q.type === "multiselect" || q.type === "dropdown" || q.type === "passage-mcq") return sameArray(answer, q.answer);
  if(q.type === "matching") return sameArray(answer, q.answer);
  if(q.type === "partab"){
    if(!answer || !Array.isArray(answer.partA) || !Array.isArray(answer.partB)) return false;
    return sameArray(answer.partA, q.partA.answer) && sameArray(answer.partB, q.partB.answer);
  }
  return false;
}
function currentAnswerLabel(q, ans){
  if(ans === null) return "No answer";
  if(q.type === "mc" || q.type === "multiselect" || q.type === "dropdown" || q.type === "passage-mcq") return ans.map(i => letter(i)).join(", ");
  if(q.type === "matching") return "Answered";
  if(q.type === "partab"){
    const a = (ans.partA || []).map(i => letter(i)).join(", ");
    const b = (ans.partB || []).map(i => letter(i)).join(", ");
    return `Part A: ${a || "-"} | Part B: ${b || "-"}`;
  }
  return "Answered";
}

function renderQuestion(){
  const q = QUESTIONS[state.current], currentAnswer = state.answers[state.current];
  document.getElementById("app").innerHTML = buildTopbar() + `
    <div class="panel question-card">
      <div class="q-type">Question ${state.current + 1} of ${QUESTIONS.length} • ${escapeHtml(q.type.toUpperCase())} • ${escapeHtml(q.cs)}</div>
      ${q.passage ? `<div class="passage">${escapeHtml(q.passage)}</div>` : ``}
      ${q.prompt ? `<div class="prompt-box">${escapeHtml(q.prompt)}</div>` : ``}
      <div class="q-stem">${escapeHtml(q.stem)}</div>
      ${renderInputForQuestion(q, currentAnswer)}
      <div class="footer-actions">
        <button class="secondary" ${state.current === 0 ? "disabled" : ""} onclick="prevQuestion()">Previous</button>
        <button class="secondary" onclick="skipQuestion()">Skip</button>
      </div>
    </div>`;
}
function renderInputForQuestion(q, currentAnswer){
  if(q.type === "mc" || q.type === "passage-mcq"){
    return `<div class="choices">${q.choices.map((choice, i) => `
      <button class="choice ${currentAnswer !== null && currentAnswer[0] === i ? "selected" : ""}" onclick="selectMc(${i})">
        <span class="choice-letter">${letter(i)}.</span> ${escapeHtml(choice)}
      </button>`).join("")}</div>`;
  }
  if(q.type === "multiselect"){
    const selected = Array.isArray(currentAnswer) ? currentAnswer : [];
    return `<div class="help">Select all correct answers.</div>
      <div class="choices">${q.choices.map((choice, i) => `
        <button class="choice ${selected.includes(i) ? "selected" : ""}" onclick="toggleMulti(${i})">
          <span class="choice-letter">${letter(i)}.</span> ${escapeHtml(choice)}
        </button>`).join("")}</div>
      <div class="footer-actions" style="margin-top:12px;"><button onclick="commitMulti()">Save Answer</button></div>`;
  }
  if(q.type === "dropdown"){
    const selected = Array.isArray(currentAnswer) && currentAnswer.length ? currentAnswer[0] : "";
    return `<label class="inline-label" for="dropdownAnswer">Choose one answer</label>
      <select id="dropdownAnswer" class="input">
        <option value="">-- Select an answer --</option>
        ${q.choices.map((choice, i) => `<option value="${i}" ${String(selected)===String(i) ? "selected" : ""}>${escapeHtml(choice)}</option>`).join("")}
      </select>
      <div class="footer-actions" style="margin-top:12px;"><button onclick="commitDropdown()">Save Answer</button></div>`;
  }
  if(q.type === "matching"){
    const selected = Array.isArray(currentAnswer) ? currentAnswer : Array(q.left.length).fill("");
    return `<div class="choices">${q.left.map((leftText, idx) => `
      <div class="panel" style="margin:0;padding:12px;">
        <div class="muted" style="margin-bottom:8px;font-weight:700;">${idx + 1}. ${escapeHtml(leftText)}</div>
        <select class="input" id="match_${idx}">
          <option value="">-- Match --</option>
          ${q.right.map((r, ridx) => `<option value="${ridx}" ${String(selected[idx])===String(ridx) ? "selected" : ""}>${escapeHtml(r)}</option>`).join("")}
        </select>
      </div>`).join("")}</div>
      <div class="footer-actions" style="margin-top:12px;"><button onclick="commitMatching()">Save Answer</button></div>`;
  }
  if(q.type === "partab"){
    const selectedA = currentAnswer?.partA || [], selectedB = currentAnswer?.partB || [];
    return `<div class="prompt-box"><strong>${escapeHtml(q.partA.stem)}</strong></div>
      <div class="choices">${q.partA.choices.map((choice, i) => `
        <button class="choice ${selectedA.includes(i) ? "selected" : ""}" onclick="selectPart('A', ${i})">
          <span class="choice-letter">${letter(i)}.</span> ${escapeHtml(choice)}
        </button>`).join("")}</div>
      <div class="prompt-box" style="margin-top:14px;"><strong>${escapeHtml(q.partB.stem)}</strong></div>
      <div class="choices">${q.partB.choices.map((choice, i) => `
        <button class="choice ${selectedB.includes(i) ? "selected" : ""}" onclick="selectPart('B', ${i})">
          <span class="choice-letter">${letter(i)}.</span> ${escapeHtml(choice)}
        </button>`).join("")}</div>
      <div class="footer-actions" style="margin-top:12px;"><button onclick="commitPartAB()">Save Answer</button></div>`;
  }
  return `<div class="help">Unsupported question type.</div>`;
}
function renderTest(){ if(state.current < 0) state.current = 0; if(state.current >= QUESTIONS.length) state.current = QUESTIONS.length - 1; renderQuestion(); }

function selectMc(i){ state.answers[state.current] = [i]; save(); if(state.current < QUESTIONS.length - 1){ state.current++; save(); renderQuestion(); } else { confirmReviewOpen(); } }
function toggleMulti(i){
  const current = Array.isArray(state.answers[state.current]) ? [...state.answers[state.current]] : [];
  state.answers[state.current] = current.includes(i) ? current.filter(v => v !== i).sort((a,b)=>a-b) : [...current, i].sort((a,b)=>a-b);
  save(); renderQuestion();
}
function commitMulti(){ if(!Array.isArray(state.answers[state.current]) || !state.answers[state.current].length){ alert("Select at least one answer."); return; } if(state.current < QUESTIONS.length - 1){ state.current++; save(); renderQuestion(); } else { confirmReviewOpen(); } }
function commitDropdown(){ const el = document.getElementById("dropdownAnswer"); if(!el || el.value === ""){ alert("Choose an answer."); return; } state.answers[state.current] = [Number(el.value)]; save(); if(state.current < QUESTIONS.length - 1){ state.current++; save(); renderQuestion(); } else { confirmReviewOpen(); } }
function commitMatching(){
  const q = QUESTIONS[state.current], ans = [];
  for(let i=0;i<q.left.length;i++){ const el = document.getElementById(`match_${i}`); if(!el || el.value === ""){ alert("Complete all matches."); return; } ans.push(Number(el.value)); }
  state.answers[state.current] = ans; save(); if(state.current < QUESTIONS.length - 1){ state.current++; save(); renderQuestion(); } else { confirmReviewOpen(); }
}
function selectPart(which, i){
  const current = state.answers[state.current] || { partA: [], partB: [] };
  const next = { partA:[...(current.partA || [])], partB:[...(current.partB || [])] };
  if(which === "A") next.partA = [i];
  if(which === "B") next.partB = [i];
  state.answers[state.current] = next; save(); renderQuestion();
}
function commitPartAB(){
  const current = state.answers[state.current];
  if(!current || !Array.isArray(current.partA) || !current.partA.length || !Array.isArray(current.partB) || !current.partB.length){ alert("Answer both Part A and Part B."); return; }
  if(state.current < QUESTIONS.length - 1){ state.current++; save(); renderQuestion(); } else { confirmReviewOpen(); }
}
function prevQuestion(){ if(state.current > 0){ state.current--; save(); renderQuestion(); } }
function skipQuestion(){ if(state.current < QUESTIONS.length - 1){ state.current++; save(); renderQuestion(); } else { confirmReviewOpen(); } }
function jumpToQuestion(idx){ state.current = idx; save(); renderQuestion(); }

function reviewScreen(){
  const answered = countAnswered(), unanswered = QUESTIONS.length - answered;
  document.getElementById("app").innerHTML = buildTopbar() + `
    <div class="panel">
      <h2>Review Before Submitting</h2>
      <p class="sub">Answered: ${answered} of ${QUESTIONS.length}. Unanswered: ${unanswered}.</p>
      <div class="review-box">
        ${QUESTIONS.map((q, idx) => `
          <div class="review-item">
            <div class="review-top">
              <strong>Q${String(idx + 1).padStart(2,"0")}</strong>
              <span class="tag">${escapeHtml(q.cs)}</span>
            </div>
            <div class="muted">${escapeHtml(q.stem)}</div>
            <div style="margin-top:8px;">
              ${state.answers[idx] === null ? `<span class="tag">No answer</span>` : `<span class="tag">Answered: ${escapeHtml(currentAnswerLabel(q, state.answers[idx]))}</span>`}
            </div>
            <div class="footer-actions"><button class="secondary" onclick="jumpToQuestion(${idx})">Go to Question</button></div>
          </div>`).join("")}
      </div>
      <hr class="sep">
      <div class="footer-actions">
        <button class="secondary" onclick="renderQuestion()">Back to Test</button>
        <button onclick="submitTest()">Submit Segment</button>
      </div>
    </div>`;
}

async function submitTest(){
  if(state.submitted) return;
  const endedAt = new Date().toISOString();
  const score = QUESTIONS.reduce((sum, q, idx) => sum + (isCorrect(q, state.answers[idx]) ? 1 : 0), 0);
  const accuracy = Math.round((score / QUESTIONS.length) * 100);
  const payload = {
    studentName: state.studentName,
    day: TEST_META.day,
    segment: TEST_META.segment,
    score,
    total: QUESTIONS.length,
    accuracy,
    questions: QUESTIONS.map((q, idx) => ({
      id: q.id,
      type: q.type,
      cs: q.cs,
      efl: q.efl || "",
      contentElaboration: q.contentElaboration || "",
      correct: isCorrect(q, state.answers[idx]) ? 1 : 0
    }))
  };
  try{
    const res = await fetch(SCRIPT_URL, { method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
    const text = await res.text();
    let parsed = {};
    try{ parsed = JSON.parse(text); }catch(err){}
    if(parsed && parsed.ok === false){ alert(parsed.message || "Submission failed."); return; }
  }catch(err){
    alert("Submission did not reach the spreadsheet. Check the Apps Script URL and deployment settings, then try again.");
    return;
  }
  if(!TEACHER_OVERRIDE) localStorage.setItem(ATTEMPT_KEY, "USED");
  state.submitted = true;
  state.score = score;
  save();
  document.getElementById("app").innerHTML = `
    <a class="back-link" href="../index.html">← Back to Hub</a>
    <div class="panel">
      <div class="kicker">Submission Complete</div>
      <h1>${TEST_META.title}</h1>
      <div class="stats">
        <div class="stat"><div class="stat-label">Name</div><div class="stat-value">${escapeHtml(state.studentName)}</div></div>
        <div class="stat"><div class="stat-label">Attempt</div><div class="stat-value">${state.attemptNumber}</div></div>
        <div class="stat"><div class="stat-label">Date</div><div class="stat-value">${escapeHtml(new Date(endedAt).toLocaleDateString())}</div></div>
        <div class="stat"><div class="stat-label">Start</div><div class="stat-value">${escapeHtml(nowLocalString(state.startedAt))}</div></div>
        <div class="stat"><div class="stat-label">End</div><div class="stat-value">${escapeHtml(nowLocalString(endedAt))}</div></div>
        <div class="stat"><div class="stat-label">Runtime</div><div class="stat-value">${formatRuntime((new Date(endedAt) - new Date(state.startedAt)) / 1000)}</div></div>
        <div class="stat"><div class="stat-label">Score</div><div class="stat-value">${score} / ${QUESTIONS.length}</div></div>
        <div class="stat"><div class="stat-label">Accuracy</div><div class="stat-value">${accuracy}%</div></div>
        <div class="stat"><div class="stat-label">Result</div><div class="stat-value ${accuracy >= 80 ? "result-ready" : "result-review"}">${accuracy >= 80 ? "READY" : "REVIEW"}</div></div>
      </div>
      <div class="footer-actions">
        ${TEACHER_OVERRIDE ? `<button class="warn" onclick="teacherUnlockNow()">Teacher Unlock This Browser</button>` : ``}
        <button onclick="location.href='../index.html'">Back to Hub</button>
      </div>
    </div>`;
  localStorage.removeItem(STORAGE_KEY);
}
function tick(){
  const el = document.getElementById("runtimeDisplay");
  if(el && state.startedAt) el.textContent = formatRuntime((Date.now() - new Date(state.startedAt).getTime()) / 1000);
}

load();
if(isLocked()) buildLockedScreen();
else if(!state.studentName || !state.startedAt) buildIntro();
else { buildQuestions(); renderTest(); }
setInterval(tick, 1000);

window.prevQuestion = prevQuestion;
window.skipQuestion = skipQuestion;
window.reviewScreen = reviewScreen;
window.confirmReviewOpen = confirmReviewOpen;
window.jumpToQuestion = jumpToQuestion;
window.selectMc = selectMc;
window.toggleMulti = toggleMulti;
window.commitMulti = commitMulti;
window.commitDropdown = commitDropdown;
window.commitMatching = commitMatching;
window.selectPart = selectPart;
window.commitPartAB = commitPartAB;
window.submitTest = submitTest;
window.teacherUnlockNow = teacherUnlockNow;
</script>
</body>
</html>
